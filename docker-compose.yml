services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Mount data directory so the DB and Parquet files persist across restarts.
      - ./data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      FEDCOMMENT_DATA_DIR: /app/data
      FEDCOMMENT_DB_PATH: /app/data/fedcomment.db
      FEDCOMMENT_LOG_LEVEL: INFO
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
