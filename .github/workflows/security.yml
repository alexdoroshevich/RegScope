name: Security scans

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"  # weekly Monday 09:00 UTC

permissions:
  contents: read

jobs:
  # ── Python dep vulnerabilities ─────────────────────────────────────────────
  pip-audit:
    name: pip-audit (Python deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv sync --dev
      - name: Install pip-audit
        run: uv pip install pip-audit
      - name: Audit (fail on any known vuln)
        run: uv run pip-audit --desc on --strict

  # ── Bandit: Python static security analysis ────────────────────────────────
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - run: pip install bandit[toml]
      - run: bandit -r data/ nlp/ api/ db/ -ll

  # ── Secret scanning (defence-in-depth; GitHub Advanced Security also scans) ─
  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      # Install the gitleaks CLI directly — the gitleaks-action tarball has been
      # intermittently unavailable from GitHub's CDN for the pinned SHA.
      # Pinning the binary version gives us the same supply-chain guarantee.
      - name: Install gitleaks v8.30.1
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
      - name: Scan for secrets
        run: gitleaks detect --source . --redact --log-level warn
