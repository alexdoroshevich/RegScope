name: Auto-fill PR description

# When a PR is opened with an empty or placeholder body, populate the template.
# Fires only on `opened` — never overwrites a real description.

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  pull-requests: write

jobs:
  fill:
    name: Fill template if empty
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const unfilled =
              body.trim().length < 100 ||
              body.includes("<one specific paragraph about THIS change");
            if (!unfilled) {
              console.log("PR already has description — skipping.");
              return;
            }
            const fs = require("fs");
            const tpl = fs.readFileSync(".github/pull_request_template.md", "utf8");
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: tpl,
            });
            console.log("Auto-filled PR description from template.");
